<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quy Nhơn AI Explorer - Trợ Lý Thổ Địa</title>
    <link rel="icon" type="image/png" href="https://github.com/quynhonAiEXPLORER/quynhonaiexplorer.github.io/blob/main/logo.png?raw=true">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.4)), 
                        url('https://github.com/quynhonAiEXPLORER/quynhonaiexplorer.github.io/blob/950bcf7605a0349ff66bec673b9f817955a43a0d/R.png?raw=true') no-repeat center center fixed;
            background-size: cover; min-height: 100vh; margin: 0; -webkit-tap-highlight-color: transparent;
        }
        .glass-nav { background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-bottom-nav { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); border-top: 1px solid rgba(255, 255, 255, 0.1); padding-bottom: env(safe-area-inset-bottom); }
        .glass-panel { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .glass-card { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.2s ease; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #chat-box { scroll-behavior: smooth; }
        .message-row { display: flex; gap: 10px; margin-bottom: 16px; align-items: flex-end; width: 100%; }
        .message-row.user { flex-direction: row-reverse; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 1px solid rgba(249,115,22,0.3); }
        .chat-bubble { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 0.95rem; animation: fadeIn 0.3s ease; line-height: 1.5; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .typing-indicator { display: flex; gap: 4px; padding: 12px 16px; background: rgba(249, 115, 22, 0.1); border-radius: 18px; width: fit-content; }
        .typing-dot { width: 6px; height: 6px; background-color: #fdba74; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        .animate-ping-slow { animation: bounce 2s infinite; }
    </style>
</head>
<body class="flex flex-col items-center pt-20 pb-24 md:pb-8"> 

    <nav class="fixed top-0 left-0 right-0 z-30 glass-nav px-4 md:px-8 py-3 flex justify-center md:justify-between items-center transition-all">
        <div class="flex items-center gap-2 cursor-pointer">
            <img src="https://github.com/quynhonAiEXPLORER/quynhonaiexplorer.github.io/blob/main/logo.png?raw=true" class="w-8 h-8 rounded-full shadow-lg border border-white/20">
            <span class="font-black text-lg md:text-xl text-white tracking-wide uppercase">Quy Nhơn <span class="text-orange-500">AI Explorer</span></span>
        </div>
        <div class="hidden md:flex items-center gap-6 text-sm font-semibold text-gray-300">
            <a href="#" class="text-orange-400 flex items-center gap-2 px-3 py-2 rounded-lg bg-white/5 border border-white/10"><i class="fa-solid fa-house"></i> Khám phá</a>
            <a href="#" onclick="alert('Đang hoàn thiện...')" class="hover:text-orange-400 flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-white/5"><i class="fa-solid fa-map-location-dot"></i> Lịch trình</a>
            <a href="#" class="hover:text-orange-400 flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-white/5"><i class="fa-solid fa-bowl-food"></i> Đặc sản</a>
            <a href="#" onclick="alert('Cá nhân')" class="hover:text-orange-400 flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-white/5"><i class="fa-regular fa-circle-user"></i> Cá nhân</a>
        </div>
    </nav>

    <div class="max-w-5xl w-full text-center text-white px-4 md:mt-8">
        <header class="mb-6 mt-2">
            <div class="inline-block px-3 py-1 rounded-full bg-orange-500/20 text-orange-400 text-xs md:text-sm font-semibold mb-3 border border-orange-500/30">AI First – BTSX</div>
            <h1 class="text-4xl md:text-7xl font-black tracking-tighter mb-1 md:mb-3 uppercase drop-shadow-lg">Quy Nhơn</h1>
            <p class="text-gray-300 text-sm md:text-lg max-w-lg mx-auto font-light leading-relaxed mt-3 px-2 drop-shadow-md">Mọi vấn đề ở Quy Nhơn, có Anh Tư lo hết nhen!</p>
            <button onclick="alert('Đang lập lịch trình...')" class="mt-6 md:mt-8 w-full sm:w-auto px-6 py-3.5 md:px-8 md:py-4 bg-gradient-to-r from-orange-500 to-red-500 text-white font-bold rounded-2xl md:rounded-full shadow-[0_0_15px_rgba(249,115,22,0.4)] transition-all flex items-center justify-center gap-2 mx-auto">
                <i class="fa-solid fa-wand-magic-sparkles"></i> Lên lịch trình AI (10s)
            </button>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-5 relative z-10">
            <div onclick="openFeature('Chatbot Thổ Địa')" class="glass-card rounded-2xl md:rounded-3xl p-4 md:p-8 flex flex-col items-center justify-center gap-2 md:gap-4 cursor-pointer min-h-[120px]">
                <div class="w-12 h-12 md:w-16 md:h-16 rounded-2xl bg-blue-500/20 flex items-center justify-center text-blue-400 text-2xl md:text-3xl"><i class="fa-regular fa-comments"></i></div>
                <div class="text-center"><h3 class="font-bold text-sm md:text-lg text-white">Tư Nẫu</h3><p class="text-[10px] md:text-xs text-gray-400 mt-1 md:mt-2">Hỏi đáp 24/7</p></div>
            </div>
            <div onclick="openFeature('Bản đồ Khám phá')" class="glass-card rounded-2xl md:rounded-3xl p-4 md:p-8 flex flex-col items-center justify-center gap-2 md:gap-4 cursor-pointer min-h-[120px]">
                <div class="w-12 h-12 md:w-16 md:h-16 rounded-2xl bg-green-500/20 flex items-center justify-center text-green-400 text-2xl md:text-3xl"><i class="fa-solid fa-location-dot"></i></div>
                <div class="text-center"><h3 class="font-bold text-sm md:text-lg text-white">Check-in</h3><p class="text-[10px] md:text-xs text-gray-400 mt-1 md:mt-2">Tọa độ HOT</p></div>
            </div>
            <div onclick="openFeature('Audio Thuyết minh')" class="glass-card rounded-2xl md:rounded-3xl p-4 md:p-8 flex flex-col items-center justify-center gap-2 md:gap-4 cursor-pointer min-h-[120px]">
                <div class="w-12 h-12 md:w-16 md:h-16 rounded-2xl bg-purple-500/20 flex items-center justify-center text-purple-400 text-2xl md:text-3xl"><i class="fa-solid fa-headphones"></i></div>
                <div class="text-center"><h3 class="font-bold text-sm md:text-lg text-white">Audio Guide</h3><p class="text-[10px] md:text-xs text-gray-400 mt-1 md:mt-2">Nghe lịch sử</p></div>
            </div>
            <div onclick="openFeature('Học Tiếng "Nẫu"')" class="glass-card rounded-2xl md:rounded-3xl p-4 md:p-8 flex flex-col items-center justify-center gap-2 md:gap-4 cursor-pointer min-h-[120px]">
                <div class="w-12 h-12 md:w-16 md:h-16 rounded-2xl bg-orange-500/20 flex items-center justify-center text-orange-400 text-2xl md:text-3xl"><i class="fa-solid fa-book-open"></i></div>
                <div class="text-center"><h3 class="font-bold text-sm md:text-lg text-white">Tiếng "Nẫu"</h3><p class="text-[10px] md:text-xs text-gray-400 mt-1 md:mt-2">Giao tiếp bản địa</p></div>
            </div>
        </div>

        <footer class="mt-12 md:mt-20 text-gray-400 text-xs md:text-sm pb-8 md:pb-4 flex flex-col items-center gap-4">
            <p>© 2026 AI First – BTSX - Trường THPT Bùi Thị Xuân</p>
            <a href="https://www.facebook.com/profile.php?id=100094880366095" target="_blank" class="w-10 h-10 bg-white/5 rounded-full flex items-center justify-center border border-white/10 shadow-sm"><i class="fab fa-facebook-f text-lg"></i></a>
        </footer>
    </div>

    <div id="modal" class="fixed inset-0 z-50 hidden flex flex-col justify-end md:justify-center items-center p-0 md:p-4">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="glass-panel w-full md:max-w-2xl overflow-hidden flex flex-col relative rounded-t-3xl md:rounded-3xl modal-slide-up shadow-2xl" style="height: 88vh; md:height: 80vh;">
            <div class="px-5 py-4 border-b border-white/10 flex justify-between items-center text-white">
                <div class="flex items-center gap-3">
                    <div id="modal-icon" class="text-xl text-orange-400 bg-orange-500/10 w-8 h-8 rounded-full flex items-center justify-center"></div>
                    <h3 id="modal-title" class="font-bold text-lg md:text-xl uppercase tracking-wide"></h3>
                </div>
                <button onclick="closeModal()" class="bg-white/10 w-8 h-8 rounded-full flex items-center justify-center transition-colors cursor-pointer"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="modal-content" class="flex-1 overflow-y-auto p-3 md:p-5 text-white no-scrollbar"></div>
            <div id="chat-input-area" class="p-3 md:p-5 bg-gray-900/80 border-t border-white/10 hidden pb-safe">
                <form onsubmit="sendMessage(event)" class="relative flex gap-2">
                    <input type="text" id="ai-input" placeholder="Hỏi Anh Tư: khách sạn, ăn uống, đi chơi..." class="flex-1 bg-white/10 border border-white/10 rounded-full py-3 px-5 text-sm text-white focus:outline-none focus:border-orange-500">
                    <button type="submit" class="bg-orange-500 text-white w-12 md:w-14 rounded-full flex items-center justify-center cursor-pointer"><i class="fa-solid fa-paper-plane"></i></button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // CẤU HÌNH API
        const keyPoolNguoc = ['QBGPFUBKDAM-YeV7sV0n_SZ4tNGKIfTVBySazIA', 'gQMHoJNIewQeiNS-Hy5MzEV3QEY_2Pr5DySazIA', 'QJ6wvTWhfrK3SN0mhCd48oJzfMCd3kHPCySazIA'];
        let currentKeyIndex = 0;
        function getNextApiKey() {
            const keyThat = keyPoolNguoc[currentKeyIndex].split('').reverse().join('');
            currentKeyIndex = (currentKeyIndex + 1) % keyPoolNguoc.length;
            return keyThat;
        }

        const userAvatar = "https://ui-avatars.com/api/?name=B&background=334155&color=fff&rounded=true";
        const aiAvatar = "https://github.com/quynhonAiEXPLORER/quynhonaiexplorer.github.io/blob/main/logo.png?raw=true";

        function openFeature(name) {
            const modal = document.getElementById('modal');
            const content = document.getElementById('modal-content');
            const chatArea = document.getElementById('chat-input-area');
            document.getElementById('modal-title').innerText = name;
            document.getElementById('modal-icon').innerHTML = '<i class="fa-regular fa-comments"></i>';
            if (name === 'Chatbot Thổ Địa') {
                if (!document.getElementById('chat-box')) {
                    content.innerHTML = `<div id="chat-box" class="space-y-3 flex flex-col pb-4 no-scrollbar"><div class="message-row"><img src="${aiAvatar}" class="avatar border border-orange-500/30"><div class="chat-bubble bg-orange-500/20 text-orange-50 border border-orange-500/20">Chu cha! Chào Bạn. Tui là Anh Tư Nẫu. Tui biết tuốt Quy Nhơn, hỏi gì tui cũng trả lời nhen!</div></div></div>`;
                }
                chatArea.classList.remove('hidden');
            } else { chatArea.classList.add('hidden'); content.innerHTML = `<div class="text-center text-gray-400 mt-10">Tính năng đang tải...</div>`; }
            modal.classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        async function sendMessage(event) {
            event.preventDefault();
            const input = document.getElementById('ai-input');
            const chatBox = document.getElementById('chat-box');
            const text = input.value.trim();
            if (!text) return;

            chatBox.innerHTML += `<div class="message-row user"><img src="${userAvatar}" class="avatar"><div class="chat-bubble bg-white/10 text-white border border-white/10">${text}</div></div>`;
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            const typingId = 'typing-' + Date.now();
            chatBox.innerHTML += `<div id="${typingId}" class="message-row"><img src="${aiAvatar}" class="avatar border border-orange-500/30"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            const rawResponse = await getAIResponse(text);
            document.getElementById(typingId).remove();

            let finalHtml = '';
            try {
                const cleanJsonStr = rawResponse.replace(/```json/gi, '').replace(/```/gi, '').trim();
                const aiData = JSON.parse(cleanJsonStr);
                finalHtml = `<div class="chat-bubble bg-orange-500/20 text-orange-50 border border-orange-500/20 mb-3">${aiData.text}</div>`;

                if (aiData.type === "location" && aiData.places) {
                    aiData.places.forEach(place => {
                        // TẠO LINK SEARCH GOOGLE MAPS ĐỂ XEM ẢNH THẬT
                        const mapSearchUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(place.name + " Quy Nhơn")}`;
                        
                        finalHtml += `
                        <div class="bg-gray-800/90 rounded-2xl overflow-hidden border border-white/10 mt-2 shadow-xl w-full max-w-[300px]">
                            <iframe width="100%" height="180" frameborder="0" style="border:0" 
                                src="https://www.google.com/maps/embed/v1/place?key=AIzaSyA_THAY_KEY_GOOGLE_MAPS_CUA_BAN_VAO_DAY&q=${encodeURIComponent(place.name + " Quy Nhơn")}" allowfullscreen>
                            </iframe>
                            <div class="p-3 text-left">
                                <h4 class="font-bold text-orange-400 text-sm mb-1">${place.name}</h4>
                                <p class="text-[11px] text-gray-300 mb-2"><i class="fa-solid fa-location-dot text-orange-500 mr-1"></i> ${place.address}</p>
                                <a href="${mapSearchUrl}" target="_blank" class="block w-full bg-blue-600 hover:bg-blue-700 text-white text-[12px] py-2 rounded-xl text-center font-bold transition">
                                    <i class="fa-solid fa-images mr-1"></i> Xem Ảnh & Chỉ đường
                                </a>
                            </div>
                        </div>`;
                    });
                }
            } catch (e) { finalHtml = `<div class="chat-bubble bg-orange-500/20 text-orange-50 border border-orange-500/20">${rawResponse}</div>`; }

            chatBox.innerHTML += `<div class="message-row flex flex-col items-start gap-0"><div class="flex items-end gap-2"><img src="${aiAvatar}" class="avatar border border-orange-500/30"><div>${finalHtml}</div></div></div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function getAIResponse(userText) {
            const currentKey = getNextApiKey();
            const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${currentKey}`;
            const prompt = `Bạn là "Anh Tư", thổ địa Quy Nhơn rành rẽ mọi thứ. Trả lời: "${userText}". 
            BẮT BUỘC TRẢ VỀ JSON DUY NHẤT: { "type": "location", "text": "...", "places": [{"name": "Tên thật", "address": "Địa chỉ thật"}] } 
            Nếu không tìm địa điểm thì type: "text". Trả lời ngắn gọn, hóm hỉnh.`;

            try {
                const res = await fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }) });
                const data = await res.json();
                return data.candidates[0].content.parts[0].text;
            } catch (e) { return '{"type":"text", "text":"Chu cha, lỗi mạng rầu!"}'; }
        }
    </script>
</body>
</html>
