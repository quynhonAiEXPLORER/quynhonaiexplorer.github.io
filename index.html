<script>
    // --- 1. TỪ ĐIỂN ẢNH "CHÍNH CHỦ" QUY NHƠN ---
    // Mẹo: Bạn hãy thay các link này bằng link ảnh thật trên Github của nhóm bạn
    const quyNhonPhotos = {
        'mon-an': 'https://images.unsplash.com/photo-1555939594-58d7cb561ad1?w=500&q=80', // Thay bằng ảnh Bún cá/Bánh xèo
        'hai-san': 'https://images.unsplash.com/photo-1599084942896-675e73122f80?w=500&q=80',
        'khach-san': 'https://images.unsplash.com/photo-1566073771259-6a8506099945?w=500&q=80',
        'bien': 'https://raw.githubusercontent.com/quynhonAiEXPLORER/quynhonaiexplorer.github.io/refs/heads/main/kyco4.jpg',
        'di-tich': 'https://raw.githubusercontent.com/quynhonAiEXPLORER/quynhonaiexplorer.github.io/refs/heads/main/thapdoi.jpg',
        'cafe': 'https://images.unsplash.com/photo-1554118811-1e0d58224f24?w=500&q=80',
        'mac-dinh': 'https://raw.githubusercontent.com/quynhonAiEXPLORER/quynhonaiexplorer.github.io/refs/heads/main/ghenhrang.jpg'
    };

    // (Giữ nguyên các hàm updateDynamicGreeting, getNextApiKey, userAvatar, aiAvatar của bạn...)

    async function sendMessage(event) {
        event.preventDefault();
        const input = document.getElementById('ai-input');
        const chatBox = document.getElementById('chat-box');
        const text = input.value.trim();
        if (!text) return;

        chatBox.innerHTML += `<div class="message-row user"><img src="${userAvatar}" class="avatar"><div class="chat-bubble bg-white/10 text-white border border-white/10">${text}</div></div>`;
        input.value = '';
        chatBox.scrollTop = chatBox.scrollHeight;

        const typingId = 'typing-' + Date.now();
        chatBox.innerHTML += `<div id="${typingId}" class="message-row"><img src="${aiAvatar}" class="avatar border border-orange-500/30"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
        chatBox.scrollTop = chatBox.scrollHeight;

        const rawResponse = await getAIResponse(text);
        document.getElementById(typingId).remove();

        let finalHtml = '';
        try {
            const cleanJsonStr = rawResponse.replace(/```json/gi, '').replace(/```/gi, '').trim();
            const aiData = JSON.parse(cleanJsonStr);
            
            finalHtml = `<div class="chat-bubble bg-orange-500/20 text-orange-50 border border-orange-500/20 mb-3">${aiData.text}</div>`;

            if (aiData.type === "location" && aiData.places) {
                aiData.places.forEach(place => {
                    // TẠO LINK GOOGLE MAPS CHUẨN XÁC
                    const mapUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(place.name + " Quy Nhơn")}`;
                    
                    // LẤY ẢNH TỪ KHO AN TOÀN THEO LOẠI
                    const imgUrl = quyNhonPhotos[place.category] || quyNhonPhotos['mac-dinh'];

                    finalHtml += `
                    <div class="bg-gray-800/80 rounded-xl overflow-hidden border border-white/10 mt-1 shadow-lg w-[260px] md:w-[300px]">
                        <img src="${imgUrl}" class="w-full h-32 object-cover">
                        <div class="p-3 text-left">
                            <h4 class="font-bold text-orange-400 text-sm mb-1">${place.name}</h4>
                            <p class="text-[11px] md:text-xs text-gray-300 mb-1"><i class="fa-solid fa-location-dot w-4 text-orange-400"></i> ${place.address}</p>
                            <p class="text-[11px] md:text-xs text-green-400 mb-3"><i class="fa-solid fa-tag w-4 text-green-400"></i> Giá: ${place.price}</p>
                            <a href="${mapUrl}" target="_blank" class="block w-full bg-blue-600 hover:bg-blue-700 text-white text-[12px] py-2 rounded-lg text-center font-bold transition">
                                <i class="fa-solid fa-map"></i> Xem trên Google Maps
                            </a>
                        </div>
                    </div>`;
                });
            }
        } catch (e) {
            finalHtml = `<div class="chat-bubble bg-orange-500/20 text-orange-50 border border-orange-500/20">${rawResponse}</div>`;
        }

        chatBox.innerHTML += `<div class="message-row flex flex-col items-start gap-0"><div class="flex items-end gap-2"><img src="${aiAvatar}" class="avatar border border-orange-500/30"><div>${finalHtml}</div></div></div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function getAIResponse(userText) {
        const currentKey = getNextApiKey();
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${currentKey}`;
        
        const prompt = `Bạn là Anh Tư Nẫu, thổ địa Quy Nhơn. Trả lời: "${userText}"
        BẮT BUỘC TRẢ VỀ JSON:
        {
          "type": "location" hoặc "text",
          "text": "Câu trả lời hóm hỉnh...",
          "places": [
            {
              "name": "Tên địa điểm thật",
              "address": "Địa chỉ",
              "price": "Giá",
              "category": "Chọn 1 từ: mon-an, hai-san, khach-san, bien, di-tich, cafe"
            }
          ]
        }`;

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            const data = await res.json();
            return data.candidates[0].content.parts[0].text;
        } catch (e) { return '{"type":"text", "text":"Chu cha, lỗi mạng rầu!"}'; }
    }
</script>
