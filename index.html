<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quy Nhơn AI Explorer - Trợ Lý Thổ Địa</title>
    <link rel="icon" type="image/png" href="https://github.com/quynhonAiEXPLORER/quynhonaiexplorer.github.io/blob/main/logo.png?raw=true">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.4)), 
                        url('https://github.com/quynhonAiEXPLORER/quynhonaiexplorer.github.io/blob/950bcf7605a0349ff66bec673b9f817955a43a0d/R.png?raw=true') no-repeat center center fixed;
            background-size: cover;
            min-height: 100vh;
            margin: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-nav { background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .glass-panel { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #chat-box { scroll-behavior: smooth; }

        .message-row { display: flex; gap: 10px; margin-bottom: 16px; align-items: flex-end; width: 100%; }
        .message-row.user { flex-direction: row-reverse; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 1px solid rgba(249,115,22,0.3); }
        .chat-bubble { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 0.95rem; animation: fadeIn 0.3s ease; line-height: 1.5; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        .typing-indicator { display: flex; gap: 4px; padding: 12px 16px; background: rgba(249, 115, 22, 0.1); border-radius: 18px; width: fit-content; }
        .typing-dot { width: 6px; height: 6px; background-color: #fdba74; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>
<body class="flex flex-col items-center pt-20 pb-24 md:pb-8"> 

    <nav class="fixed top-0 left-0 right-0 z-30 glass-nav px-4 md:px-8 py-3 flex justify-center md:justify-between items-center transition-all">
        <div class="flex items-center gap-2 cursor-pointer">
            <img src="https://github.com/quynhonAiEXPLORER/quynhonaiexplorer.github.io/blob/main/logo.png?raw=true" class="w-8 h-8 rounded-full shadow-lg border border-white/20">
            <span class="font-black text-lg md:text-xl text-white tracking-wide uppercase drop-shadow-md">
                Quy Nhơn <span class="text-orange-500">AI Explorer</span>
            </span>
        </div>
        <div class="hidden md:flex items-center gap-6 text-sm font-semibold text-gray-300">
            <a href="#" class="text-orange-400 flex items-center gap-2 px-3 py-2 rounded-lg bg-white/5"><i class="fa-solid fa-house"></i> Khám phá</a>
        </div>
    </nav>

    <div class="max-w-5xl w-full text-center text-white px-4 md:mt-8">
        <header class="mb-6 mt-2">
            <div class="inline-block px-3 py-1 rounded-full bg-orange-500/20 text-orange-400 text-xs md:text-sm font-semibold mb-3 border border-orange-500/30">AI First – BTSX</div>
            <h1 class="text-4xl md:text-7xl font-black tracking-tighter mb-1 md:mb-3 uppercase drop-shadow-lg">Quy Nhơn</h1>
            <p class="text-gray-300 text-sm md:text-lg max-w-lg mx-auto font-light leading-relaxed mt-3 px-2 drop-shadow-md">Ăn gì, chơi đâu Tư Nẫu có lo!</p>
            <button onclick="openFeature('Chatbot Thổ Địa')" class="mt-6 md:mt-8 w-full sm:w-auto px-6 py-3.5 md:px-8 md:py-4 bg-orange-500 text-white font-bold rounded-2xl md:rounded-full flex items-center justify-center gap-2 mx-auto text-base md:text-lg">
                <i class="fa-solid fa-wand-magic-sparkles"></i> Mở Anh Tư Nẫu
            </button>
        </header>
    </div>

    <div id="modal" class="fixed inset-0 z-50 hidden flex flex-col justify-end md:justify-center items-center p-0 md:p-4">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="closeModal()"></div>
        <div class="glass-panel w-full md:max-w-2xl overflow-hidden flex flex-col relative rounded-t-3xl md:rounded-3xl modal-slide-up shadow-2xl" style="height: 88vh;">
            <div class="w-full flex justify-center pt-3 pb-1 md:hidden"><div class="w-12 h-1.5 bg-gray-500/50 rounded-full"></div></div>
            <div class="px-5 py-4 border-b border-white/10 flex justify-between items-center text-white">
                <div class="flex items-center gap-3">
                    <div id="modal-icon" class="text-xl text-orange-400 bg-orange-500/10 w-8 h-8 rounded-full flex items-center justify-center"></div>
                    <h3 id="modal-title" class="font-bold text-lg md:text-xl uppercase tracking-wide"></h3>
                </div>
                <button onclick="closeModal()" class="bg-white/10 hover:bg-white/20 w-8 h-8 rounded-full flex items-center justify-center transition-colors">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            
            <div id="modal-content" class="flex-1 overflow-y-auto p-3 md:p-5 text-white no-scrollbar"></div>

            <div id="chat-input-area" class="p-3 md:p-5 bg-gray-900/80 border-t border-white/10 hidden pb-safe">
                <form onsubmit="sendMessage(event)" class="relative flex gap-2">
                    <input type="text" id="ai-input" placeholder="Tui có 50k, ăn gì ở đâu Tư ơi..." 
                           class="flex-1 bg-white/10 border border-white/10 rounded-full py-3 px-5 text-sm md:text-base text-white focus:outline-none focus:border-orange-500">
                    <button type="submit" class="bg-orange-500 hover:bg-orange-600 text-white w-12 md:w-14 rounded-full flex items-center justify-center">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // --- CẤU HÌNH API ---
        const keyPoolNguoc = ['QBGPFUBKDAM-YeV7sV0n_SZ4tNGKIfTVBySazIA', 'gQMHoJNIewQeiNS-Hy5MzEV3QEY_2Pr5DySazIA', 'QJ6wvTWhfrK3SN0mhCd48oJzfMCd3kHPCySazIA'];
        let currentKeyIndex = 0;
        function getNextApiKey() {
            const keyThat = keyPoolNguoc[currentKeyIndex].split('').reverse().join('');
            currentKeyIndex = (currentKeyIndex + 1) % keyPoolNguoc.length;
            return keyThat;
        }

        const userAvatar = "https://ui-avatars.com/api/?name=B&background=334155&color=fff&rounded=true";
        const aiAvatar = "https://github.com/quynhonAiEXPLORER/quynhonaiexplorer.github.io/blob/main/logo.png?raw=true";

        function openFeature(name) {
            document.getElementById('modal-title').innerText = name;
            document.getElementById('modal-icon').innerHTML = '<i class="fa-regular fa-comments"></i>';
            document.getElementById('chat-input-area').classList.remove('hidden');
            document.getElementById('modal').classList.remove('hidden');
            if(document.getElementById('chat-box') == null) {
                document.getElementById('modal-content').innerHTML = `<div id="chat-box" class="space-y-3 flex flex-col pb-4 no-scrollbar"><div class="message-row"><img src="${aiAvatar}" class="avatar border border-orange-500/30"><div class="chat-bubble bg-orange-500/20 text-orange-50 border border-orange-500/20">Chu cha! Chào Bạn. Có 50k hay 5tr muốn Tư Nẫu chỉ chỗ ăn chơi, tui lo hết!</div></div></div>`;
            }
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        // --- HÀM GỬI TIN NHẮN (ĐÃ CẬP NHẬT ĐỂ HIỂN THỊ THẺ) ---
        async function sendMessage(event) {
            event.preventDefault();
            const input = document.getElementById('ai-input');
            const chatBox = document.getElementById('chat-box');
            const text = input.value.trim();
            if (!text) return;

            // 1. Hiện tin nhắn của người dùng
            chatBox.innerHTML += `<div class="message-row user"><img src="${userAvatar}" class="avatar"><div class="chat-bubble bg-white/10 text-white border border-white/10">${text}</div></div>`;
            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;

            // 2. Hiện Typing
            const typingId = 'typing-' + Date.now();
            chatBox.innerHTML += `<div id="${typingId}" class="message-row"><img src="${aiAvatar}" class="avatar border border-orange-500/30"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            // 3. Gọi AI và chờ kết quả dạng JSON
            const rawResponse = await getAIResponse(text);
            document.getElementById(typingId).remove();

            // 4. Xử lý kết quả AI
            let finalHtml = '';
            try {
                // Thử parse dữ liệu từ AI
                const aiData = JSON.parse(rawResponse);
                
                // Đầu tiên là câu trả lời của Tư Nẫu
                finalHtml = `<div class="chat-bubble bg-orange-500/20 text-orange-50 border border-orange-500/20 mb-3">${aiData.text}</div>`;

                // Nếu có gợi ý địa điểm, vẽ "Thẻ Địa Điểm" cực Wow
                if (aiData.type === "location" && aiData.places && aiData.places.length > 0) {
                    aiData.places.forEach(place => {
                        finalHtml += `
                        <div class="bg-gray-800/80 rounded-2xl overflow-hidden border border-white/10 mt-1 shadow-lg w-full max-w-sm ml-10">
                            <img src="${place.image_url}" onerror="this.src='https://images.unsplash.com/photo-1555939594-58d7cb561ad1?w=500&q=80'" class="w-full h-32 object-cover">
                            <div class="p-3">
                                <h4 class="font-bold text-orange-400 text-sm mb-1">${place.name}</h4>
                                <p class="text-[11px] text-gray-300 mb-1"><i class="fa-solid fa-location-dot w-4 text-orange-400"></i> ${place.address}</p>
                                <p class="text-[11px] text-green-400 mb-3"><i class="fa-solid fa-tag w-4 text-green-400"></i> Giá: ${place.price}</p>
                                
                                <div class="flex gap-2 mt-1">
                                    <a href="${place.map_link}" target="_blank" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white text-[11px] py-1.5 rounded-lg text-center font-bold flex items-center justify-center gap-1.5 transition">
                                        <i class="fa-solid fa-map"></i> Bản đồ
                                    </a>
                                    <a href="${place.tiktok_search_link}" target="_blank" class="flex-1 bg-black hover:bg-gray-900 border border-white/20 text-white text-[11px] py-1.5 rounded-lg text-center font-bold flex items-center justify-center gap-1.5 transition">
                                        <i class="fa-brands fa-tiktok"></i> Review
                                    </a>
                                </div>
                            </div>
                        </div>`;
                    });
                }
            } catch (e) {
                // Nếu AI trả về text thường (hỏng JSON), hiển thị bubble text thường
                finalHtml = `<div class="chat-bubble bg-orange-500/20 text-orange-50 border border-orange-500/20">${rawResponse}</div>`;
            }

            // 5. In kết quả ra khung chat
            chatBox.innerHTML += `<div class="message-row flex flex-col items-start gap-0"><div class="flex items-end gap-2"><img src="${aiAvatar}" class="avatar border border-orange-500/30"><div>${finalHtml}</div></div></div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // --- HÀM GỌI API GEMINI (ĐÃ ÉP AI TRẢ VỀ JSON ĐỂ CÓ ẢNH) ---
        async function getAIResponse(userText) {
            const currentKey = getNextApiKey();
            const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${currentKey}`;
            
            const prompt = `Bạn là "Anh Tư", thổ địa Quy Nhơn, dùng từ nhen, nghen, chu cha. Trả lời người dùng hỏi: "${userText}"

--- DATABASE QUÁN ĂN THẬT (Bạn CHỈ ĐƯỢC dùng link ảnh này, KHÔNG ĐƯỢC bịa):
- Món: Bánh Xèo Tôm Nhảy Gia Vỹ. Giá: ~40k. Link ảnh: [THAY_LINK_ANH_GIA_VY_CUA_NHOM_BAN_VAO_DAY]. Địa chỉ: 14 Diên Hồng.
- Món: Bún Cá Ngọc Liên. Giá: ~35k. Link ảnh: [THAY_LINK_ANH_NGOC_LIEN_CUA_NHOM_BAN_VAO_DAY]. Địa chỉ: 379 Nguyễn Huệ.
- Món: Kem Quán Ngon (50k ăn tẹt ga). Link ảnh: [THAY_LINK_ANH_QUAN_NGON_CUA_NHOM_BAN_VAO_DAY]. Địa chỉ: 24 Nguyễn Huệ.
- Địa điểm: Tháp Đôi (Vé 20k). Link ảnh: [THAY_LINK_ANH_THAP_DOI_CUA_NHOM_BAN_VAO_DAY]. Địa chỉ: Đống Đa.
(Hiện tại tôi đang dùng link Unsplash tạm để bạn thấy nó hiển thị, BẠN CẦN THAY CHÚNG)

Nhiệm vụ: Trả về một chuỗi JSON chuẩn xác (không có dấu backtick hay chữ 'json').
Nếu người dùng tìm nơi ăn/chơi có trong DATABASE, đặc biệt khi họ nói về tiền (ví dụ 50k), hãy chọn quán phù hợp và trả về JSON có structure "location":
{
  "type": "location",
  "text": "Chu cha, 50k thì ăn món này nhen!",
  "places": [
    {
      "name": "Tên quán",
      "address": "Địa chỉ",
      "price": "Giá",
      "image_url": "LINK_ANH_LAY_TU_DATABASE",
      "map_link": "Link google maps thật đến địa chỉ này",
      "tiktok_search_link": "Link tiktok search review tên món và quán này"
    }
  ]
}
Nếu họ hỏi bình thường hoặc không tìm thấy, trả về JSON structure "text":
{ "type": "text", "text": "Câu trả lời của bạn..." }`;
            
            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await res.json();
                if (!res.ok) return "Chu cha, mạng yếu tui hổng nghe rõ. Nói lại Tư Nẫu nghe nhen!";
                return data.candidates[0].content.parts[0].text;
            } catch (e) { return "Chu cha, mạng lag quá nẫu ơi!"; }
        }
    </script>
</body>
</html>
